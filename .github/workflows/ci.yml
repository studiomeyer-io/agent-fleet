name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # `--include=optional` pulls in the LangGraph + Postgres-checkpointer
      # deps (added in v0.2 as opt-in). Without these, `tsc --noEmit` fails on
      # the conductor-langgraph imports. End-users who don't want stateful
      # mode can still install with plain `npm install` — the dynamic import
      # in conductor-langgraph.ts gives a friendly error instead of a stack.
      #
      # Using `npm install` instead of `npm ci` because npm ci with
      # `--include=optional` doesn't reliably install optional deps across
      # all node-version + npm-version combos in the matrix.
      - run: npm install --include=optional --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
